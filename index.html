<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZense — Dev Log</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #181a20;
    --surface-2: #1e2028;
    --border: #2a2d37;
    --text: #e4e6eb;
    --text-dim: #8b8d97;
    --accent: #3b82f6;
    --accent-dim: rgba(59,130,246,.12);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,.12);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,.12);
    --purple: #a855f7;
    --purple-dim: rgba(168,85,247,.12);
    --cyan: #06b6d4;
    --cyan-dim: rgba(6,182,212,.12);
    --pink: #ec4899;
    --pink-dim: rgba(236,72,153,.12);
    --teal: #14b8a6;
    --teal-dim: rgba(20,184,166,.12);
    --radius: 8px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Login Screen ── */
  .login-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    transition: opacity .3s, visibility .3s;
  }
  .login-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    width: 360px;
    text-align: center;
  }
  .login-box svg { margin-bottom: 16px; }
  .login-box h1 {
    font-size: 20px; font-weight: 600;
    margin-bottom: 4px;
  }
  .login-box p {
    color: var(--text-dim); font-size: 13px;
    margin-bottom: 28px;
  }
  .login-box input {
    display: block; width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color .2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: opacity .2s;
  }
  .login-box button:hover { opacity: .9; }
  .login-error {
    color: var(--red); font-size: 12px;
    margin-top: 10px;
    display: none;
  }

  /* ── Header ── */
  header {
    padding: 24px 32px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-left svg { flex-shrink: 0; }
  .header-left h1 { font-size: 20px; font-weight: 600; }
  .header-left span { color: var(--text-dim); font-size: 13px; }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .stat-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .stat-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }

  /* ── Filter Bar ── */
  .filters {
    padding: 14px 32px;
    display: flex; gap: 8px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    font-size: 12px; font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Timeline ── */
  .timeline { padding: 0 32px 60px; }

  .day-group { margin-top: 28px; }
  .day-header {
    position: sticky; top: 0;
    background: var(--bg);
    padding: 8px 0;
    font-size: 13px; font-weight: 600;
    color: var(--text-dim);
    letter-spacing: .03em;
    z-index: 10;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 8px;
    transition: border-color .2s;
  }
  .entry:hover { border-color: #3a3d47; }

  .entry-top {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; flex-wrap: wrap;
  }
  .tag {
    font-size: 10px; font-weight: 700;
    letter-spacing: .06em;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .tag-feat { background: var(--green-dim); color: var(--green); }
  .tag-fix  { background: var(--red-dim); color: var(--red); }
  .tag-ui   { background: var(--purple-dim); color: var(--purple); }
  .tag-refac { background: var(--amber-dim); color: var(--amber); }
  .tag-devops { background: var(--cyan-dim); color: var(--cyan); }
  .tag-docs { background: var(--pink-dim); color: var(--pink); }
  .tag-perf { background: var(--teal-dim); color: var(--teal); }
  .tag-biz  { background: var(--amber-dim); color: var(--amber); }

  .entry-title {
    font-size: 14px; font-weight: 500;
    flex: 1;
  }
  .entry-computer {
    font-size: 11px; color: var(--text-dim);
    margin-left: auto;
  }
  .entry-detail {
    font-size: 13px; color: var(--text-dim);
    line-height: 1.5;
  }

  /* ── Add Entry Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; visibility: hidden;
    transition: opacity .2s, visibility .2s;
  }
  .modal-overlay.open { opacity: 1; visibility: visible; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 440px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .modal label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--text-dim); margin-bottom: 6px; margin-top: 14px;
  }
  .modal input, .modal textarea, .modal select {
    display: block; width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    font-family: var(--font);
  }
  .modal textarea { min-height: 80px; resize: vertical; }
  .modal input:focus, .modal textarea:focus, .modal select:focus {
    border-color: var(--accent);
  }
  .modal-actions {
    display: flex; gap: 10px; justify-content: flex-end;
    margin-top: 22px;
  }
  .modal-actions button {
    padding: 8px 18px;
    border-radius: var(--radius);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    transition: all .2s;
  }
  .modal-actions .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .modal-actions .btn-primary:hover { opacity: .9; }

  /* ── Kbd shortcut hint ── */
  .kbd-hint {
    position: fixed; bottom: 20px; right: 24px;
    font-size: 11px; color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
  }
  kbd {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: var(--font);
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header, .filters, .timeline { padding-left: 16px; padding-right: 16px; }
    .login-box { width: 90%; padding: 28px 20px; }
    .modal { width: 92%; padding: 20px; }
  }
</style>

      <option value="laptop">Laptop</option>
      <option value="desktop">Desktop</option>
      <option value="computer">Computer (AI)</option>
    </select>
    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="addEntry()">Add Entry</button>

  </div>
</div>

<div class="kbd-hint"><kbd>Ctrl</kbd> + <kbd>N</kbd> &nbsp;New entry</div>

   AUTH

function attemptLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (u === VALID_USER && p === VALID_PASS) {
    authenticated = true;
    document.getElementById('loginOverlay').classList.add('hidden');
    renderAll();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') attemptLogin();
});
document.getElementById('loginUser').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginPass').focus();
});

// Sort entries newest first
entries.sort((a, b) => b.date.localeCompare(a.date));

// Persist new entries to localStorage
function saveEntries() {
  localStorage.setItem('azense-log-entries', JSON.stringify(entries));
}
function loadSavedEntries() {
  const saved = localStorage.getItem('azense-log-entries');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      // Merge: add any user-added entries (ones not in seed data) 
      const seedTitles = new Set(entries.map(e => e.date + e.title));
      for (const e of parsed) {
        if (!seedTitles.has(e.date + e.title)) {
          entries.push(e);
        }
      }
      entries.sort((a, b) => b.date.localeCompare(a.date));
    } catch {}
  }
}
loadSavedEntries();

/* ═══════════════════════════════════════
   RENDER
   ═══════════════════════════════════════ */
let activeFilter = null;

function renderAll() {
  if (!authenticated) return;
  renderStats();
  renderFilters();
  renderTimeline();
}

function renderStats() {
  const counts = {};
  for (const e of entries) counts[e.type] = (counts[e.type] || 0) + 1;
  const bar = document.getElementById('statBar');
  bar.innerHTML = '';
  const order = ['feat','fix','ui','refac','devops','docs','perf','biz'];
  for (const t of order) {
    if (!counts[t]) continue;
    const m = TAG_META[t];
    const pill = document.createElement('span');
    pill.className = 'stat-pill';
    pill.innerHTML = `<span class="stat-dot" style="background:var(--${
      t === 'feat' ? 'green' : t === 'fix' ? 'red' : t === 'ui' ? 'purple' :
      t === 'refac' ? 'amber' : t === 'devops' ? 'cyan' : t === 'docs' ? 'pink' :
      t === 'perf' ? 'teal' : 'amber'
    })"></span>${m.label} ${counts[t]}`;
    bar.appendChild(pill);
  }
}

function renderFilters() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn' + (activeFilter === null ? ' active' : '');
  allBtn.textContent = 'All';
  allBtn.onclick = () => { activeFilter = null; renderAll(); };
  bar.appendChild(allBtn);

  for (const [key, meta] of Object.entries(TAG_META)) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilter === key ? ' active' : '');
    btn.textContent = meta.label;
    btn.onclick = () => { activeFilter = key; renderAll(); };
    bar.appendChild(btn);
  }
}

function renderTimeline() {
  const container = document.getElementById('timeline');
  container.innerHTML = '';
  const filtered = activeFilter ? entries.filter(e => e.type === activeFilter) : entries;

  // Group by date
  const groups = {};
  for (const e of filtered) {
    if (!groups[e.date]) groups[e.date] = [];
    groups[e.date].push(e);
  }

  for (const [date, items] of Object.entries(groups)) {
    const group = document.createElement('div');
    group.className = 'day-group';

    const header = document.createElement('div');
    header.className = 'day-header';
    const d = new Date(date + 'T12:00:00');
    header.textContent = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    group.appendChild(header);

    for (const entry of items) {
      const el = document.createElement('div');
      el.className = 'entry';
      const meta = TAG_META[entry.type] || TAG_META.feat;
      el.innerHTML = `
        <div class="entry-top">
          <span class="tag ${meta.cls}">${meta.label}</span>
          <span class="entry-title">${esc(entry.title)}</span>
          <span class="entry-computer">${entry.computer === 'computer' ? '🤖 Computer' : entry.computer === 'laptop' ? '💻 Laptop' : '🖥️ Desktop'}</span>
        </div>
        ${entry.detail ? `<div class="entry-detail">${esc(entry.detail)}</div>` : ''}
      `;
      group.appendChild(el);
    }
    container.appendChild(group);
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ═══════════════════════════════════════
   MODAL
   ═══════════════════════════════════════ */
function openModal() {
  if (!authenticated) return;
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('entryTitle').focus();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('entryTitle').value = '';
  document.getElementById('entryDetail').value = '';
}

function addEntry() {
  const title = document.getElementById('entryTitle').value.trim();
  if (!title) return;
  const detail = document.getElementById('entryDetail').value.trim();
  const type = document.getElementById('entryType').value;
  const computer = document.getElementById('entryComputer').value;
  const today = new Date().toISOString().split('T')[0];

  entries.unshift({ date: today, type, title, detail, computer });
  entries.sort((a, b) => b.date.localeCompare(a.date));
  saveEntries();
  closeModal();
  renderAll();
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
    e.preventDefault();
    openModal();
  }
  if (e.key === 'Escape') closeModal();
});

// Click outside modal to close
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
</script>
